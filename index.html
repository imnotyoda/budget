<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumaray Budget</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#333333">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #1e1e1e;
  color: #eee;
  margin: 0;
  padding: 20px;
}

#app {
  background: #2c2c2c;
  padding: 20px;
  width: 300px;
  margin: 50px auto;
  border-radius: 8px;
}

h2 {
  margin-bottom: 10px;
  color: #eee;
}

h1 {
  margin-bottom: 20px;
  color: #f5f5f5;
}

input {
  padding: 8px;
  margin: 5px 0;
  width: 90%;
  border: 1px solid #555;
  border-radius: 5px;
  background: #1e1e1e;
  color: #eee;
}

input::placeholder {
  color: #aaa;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  margin-right: 5px;
  background: #555;
  color: #eee;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.3s;
}

button:hover {
  background: #777;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
  text-align: left;
}

ul li {
  padding: 5px 10px;
  border-bottom: 1px solid #444;
  color: #ccc;
}
</style>
</head>
<body>

<div id="app">
<h2>Budget</h2>
<h1 id="bal">0</h1>

<input type="text" id="desc" placeholder="Item">
<input type="number" id="amt" placeholder="Amount">
<button onclick="add()">Add</button>
<button onclick="resetBudget()">Reset</button>

<ul id="list"></ul>
</div>

<script>
let total = localStorage.getItem("amount") ? parseFloat(localStorage.getItem("amount")) : 0;

const b = document.getElementById('bal');
const d = document.getElementById('desc');
const a = document.getElementById('amt');
const l = document.getElementById('list');

b.innerText = total;

let savedItems = JSON.parse(localStorage.getItem("items")) || [];

savedItems.forEach(function(item){
  let li = document.createElement("li");
  li.innerText = item.name + ": " + item.value;
  l.appendChild(li);
});

function add() {
  let v = parseFloat(a.value);
  let n = d.value;

  if (n && v) {
    total += v;
    b.innerText = total;

    let data = {name:n,value:v};
    savedItems.push(data);

    localStorage.setItem("items", JSON.stringify(savedItems));
    localStorage.setItem("amount", total);

    let i = document.createElement('li');
    i.innerText = n + ": " + v;
    l.appendChild(i);

    d.value = "";
    a.value = "";
  }
}

function resetBudget() {
  total = 0;
  b.innerText = total;
  l.innerHTML = '';
  localStorage.clear();
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
